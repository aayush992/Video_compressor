app = "media-compressor-api"
primary_region = "sin"       # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false     # keep always on (free tier allows 1 machine always-on)
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512               # free tier: up to 256 MB; 512 MB = ~$1.94/mo
